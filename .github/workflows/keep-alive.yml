name: Keep Supabase Alive

on:
  schedule:
    # 매주 수요일, 일요일 UTC 00:00 (한국시간 오전 9시)에 실행
    - cron: "0 0 * * 0,3"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to keep it active
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://ygaxwzzfyuehcsrmexeb.supabase.co/rest/v1/asset_records?select=record_date&limit=1" \
            -H "apikey: sb_publishable_iYqSX4aHTpq4Zc9I5jKBGg_gAo0Mxh4"
